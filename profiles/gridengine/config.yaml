# =============================================================================
# Grid Engine (SGE/UGE) execution profile  —  Snakemake >= 8
#
# Submits each rule as an individual qsub job. threads maps to def_slot (PE),
# and resources.mem_gb maps to per-slot memory (s_vmem/mem_req).
#
# Usage (from the repository root):
#   snakemake --profile profiles/gridengine
#   (or simply: bash run.sh)
#
# Requires the generic cluster executor plugin:
#   pip install snakemake-executor-plugin-cluster-generic
#
# NOTE — adjust to your site's Grid Engine conventions:
#   - whether qsub needs s_vmem, mem_req, or both
#   - whether a job class is required (-l short / -l medium / -l ljob, etc.)
#   - your Snakemake version (for < 8, see the "legacy" note at the bottom)
# =============================================================================

executor: cluster-generic

cluster-generic-submit-cmd: >-
  qsub -S /bin/bash -cwd -j y -V
  -N smk.{rule}
  -o logs/cluster/
  -pe def_slot {threads}
  -l lmem,s_vmem={resources.mem_gb}G
  -terse

# Optional but recommended: how to cancel jobs. A status command can also be
# added (cluster-generic-status-cmd) with a small helper script; without one,
# rely on -sync in the legacy command below.
cluster-generic-cancel-cmd: "qdel"

# Maximum number of jobs submitted concurrently (match your site's limits).
jobs: 50

# Default resources for all rules (overridden per rule).
default-resources:
  mem_gb: 4

latency-wait: 120          # tolerate NFS delays in seeing output files
rerun-incomplete: True
keep-going: True
printshellcmds: True
rerun-triggers: mtime      # avoid spurious re-runs after minor code edits

# =============================================================================
# LEGACY (Snakemake < 8): do not use the executor above; instead run on the
# command line with:
#
#   snakemake --jobs 50 --latency-wait 120 \
#     --cluster "qsub -S /bin/bash -cwd -j y -N smk.{rule} -o logs/cluster/ \
#                -pe def_slot {threads} -l s_vmem={resources.mem_gb}G,mem_req={resources.mem_gb}G -sync y"
#
# (-sync y blocks until each job finishes, which simplifies status tracking.)
# =============================================================================
